<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>What are your work values?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    try {
      const storageKey = "ce-theme";
      const savedTheme = localStorage.getItem(storageKey);
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
    } catch (err) {
      document.documentElement.dataset.theme = "light";
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: [
              "Plus Jakarta Sans",
              "Inter",
              "system-ui",
              "-apple-system",
              "BlinkMacSystemFont",
              "Segoe UI",
              "sans-serif"
            ]
          }
        }
      }
    };
  </script>
  <style>
    :root {
      color-scheme: light;
      --font-sans: "Plus Jakarta Sans", "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg-page: #f6f7fb;
      --bg-page-alt: #eef2ff;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-elevated: rgba(255, 255, 255, 0.98);
      --surface-muted: rgba(15, 23, 42, 0.06);
      --surface-hover: rgba(15, 23, 42, 0.05);
      --border-soft: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.16);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #64748b;
      --muted: #64748b;
      --accent-600: #1d4ed8;
      --accent-500: #2563eb;
      --accent-400: #3b82f6;
      --accent-300: #60a5fa;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --accent-ring: rgba(37, 99, 235, 0.35);
      --success-600: #047857;
      --success-soft: rgba(16, 185, 129, 0.12);
      --success-border: rgba(5, 150, 105, 0.28);
      --warning-600: #b45309;
      --warning-soft: rgba(245, 158, 11, 0.14);
      --warning-border: rgba(217, 119, 6, 0.28);
      --neutral-soft: rgba(148, 163, 184, 0.16);
      --neutral-border: rgba(148, 163, 184, 0.25);
      --shadow-sm: 0 12px 36px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 30px 70px rgba(15, 23, 42, 0.12);
      --text-on-accent: #ffffff;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg-page: #0b1220;
      --bg-page-alt: #141e34;
      --surface: rgba(15, 23, 42, 0.78);
      --surface-elevated: rgba(15, 23, 42, 0.92);
      --surface-muted: rgba(148, 163, 184, 0.12);
      --surface-hover: rgba(148, 163, 184, 0.18);
      --border-soft: rgba(148, 163, 184, 0.18);
      --border-strong: rgba(148, 163, 184, 0.4);
      --text-primary: #e2e8f0;
      --text-secondary: #cbd5f5;
      --text-tertiary: #94a3b8;
      --muted: #94a3b8;
      --accent-600: #60a5fa;
      --accent-500: #38bdf8;
      --accent-400: #0ea5e9;
      --accent-300: rgba(56, 189, 248, 0.6);
      --accent-soft: rgba(56, 189, 248, 0.18);
      --accent-ring: rgba(56, 189, 248, 0.45);
      --success-600: #34d399;
      --success-soft: rgba(52, 211, 153, 0.22);
      --success-border: rgba(52, 211, 153, 0.45);
      --warning-600: #fbbf24;
      --warning-soft: rgba(251, 191, 36, 0.16);
      --warning-border: rgba(251, 191, 36, 0.35);
      --neutral-soft: rgba(148, 163, 184, 0.18);
      --neutral-border: rgba(148, 163, 184, 0.3);
      --shadow-sm: 0 20px 48px rgba(8, 15, 35, 0.6);
      --shadow-md: 0 40px 90px rgba(8, 15, 35, 0.55);
      --text-on-accent: #0b1220;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-sans);
      background: radial-gradient(130% 130% at 0% 0%, var(--bg-page-alt) 0%, var(--bg-page) 55%);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background 0.4s ease, color 0.3s ease;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content-width {
      width: min(1100px, 100%);
      margin-inline: auto;
    }

    header {
      padding-top: 2.75rem;
      padding-bottom: 1.25rem;
    }

    .brand-block {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .page-title {
      font-size: clamp(1.9rem, 4vw, 2.9rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-weight: 600;
      color: var(--accent-600);
    }

    .text-muted {
      color: var(--text-secondary);
    }

    .status-card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border-soft);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
      margin-bottom: 1.5rem;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .progress-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .progress-fraction {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent-600);
    }

    .progress-track {
      width: 100%;
      height: 0.65rem;
      background: var(--surface-muted);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-500), var(--accent-400));
      transition: width 0.35s ease;
    }

    .progress-text {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .grid-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 960px) {
      .grid-layout {
        grid-template-columns: 1fr;
      }
    }

    .current-card {
      background: var(--surface);
      border-radius: 24px;
      border: 1px solid var(--border-soft);
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .current-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .current-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 0.25rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent-600);
      width: fit-content;
    }

    .choice-group {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: 1fr;
    }

    .choice-group > .btn {
      width: 100%;
      min-width: 0;
      white-space: normal;
      word-break: keep-all;
      text-align: center;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.4rem;
      border-radius: 18px;
      border: 1px solid transparent;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
      min-height: 44px;
    }

    .btn-primary {
      background: linear-gradient(120deg, var(--accent-500), var(--accent-400));
      color: var(--text-on-accent);
      border-color: transparent;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.02); }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border-strong); color: var(--text-primary); }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-icon { width: 44px; height: 44px; border-radius: 14px; background: var(--surface); border: 1px solid var(--border-soft); color: var(--text-primary); padding: 0; }
    .btn-icon:hover { background: var(--surface-hover); }
    .btn-link { background: transparent; border: none; padding: 0; color: var(--accent-600); font-size: 0.85rem; font-weight: 600; text-decoration: none; }
    .btn-link:hover { text-decoration: underline; }
    .choice-btn-low { background: var(--neutral-soft); border-color: var(--neutral-border); color: var(--text-primary); }
    .choice-btn-low:hover { background: rgba(148, 163, 184, 0.22); }
    .choice-btn-mid { background: var(--accent-soft); border-color: var(--accent-300); color: var(--accent-600); }
    .choice-btn-mid:hover { background: rgba(37, 99, 235, 0.18); }
    .choice-btn-high { background: var(--success-soft); border-color: var(--success-border); color: var(--success-600); }
    .choice-btn-high:hover { background: rgba(16, 185, 129, 0.2); }

    .list-column {
      background: var(--surface);
      border-radius: 22px;
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .column-header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--surface);
      border-bottom: 1px solid var(--border-soft);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
    }

    .count-badge { font-size: 0.85rem; font-weight: 600; color: var(--text-tertiary); }

    .list-scroll {
      list-style: none;
      margin: 0;
      padding: 1.25rem;
      display: grid;
      gap: 0.75rem;
      overflow-y: auto;
      max-height: 420px;
      flex: 1;
    }

    .list-card {
      background: var(--surface-elevated);
      border-radius: 18px;
      border: 1px solid var(--border-soft);
      padding: 1rem;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
    }

    .column-low .list-card { border-color: var(--neutral-border); }
    .column-mid .list-card { border-color: var(--accent-300); background: var(--accent-soft); }
    .column-high .list-card { border-color: var(--success-border); background: var(--success-soft); }
    .list-card:hover { transform: translateY(-2px); }
    .item-header { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    .item-title { font-weight: 600; color: var(--text-primary); font-size: 1rem; }
    .item-description { margin-top: 0.55rem; font-size: 0.85rem; color: var(--text-secondary); }

    .column-footer { padding: 0 1.25rem 1.25rem; display: grid; gap: 0.75rem; }
    .column-footer .btn { width: 100%; }

    .shortlist-hint {
      border-radius: 18px;
      padding: 0.95rem 1rem;
      border: 1px solid var(--warning-border);
      background: var(--warning-soft);
    }
    .shortlist-hint-title { font-weight: 700; color: var(--text-primary); }
    .shortlist-hint-text { margin-top: 0.35rem; font-size: 0.88rem; color: var(--text-secondary); }
    .hidden { display: none !important; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 50;
    }

    .modal-card {
      width: min(760px, 100%);
      max-height: min(84vh, 760px);
      overflow: hidden;
      background: var(--surface-elevated);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border-soft);
    }

    .modal-title-wrap { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .modal-title { font-size: 1.15rem; font-weight: 700; color: var(--text-primary); }
    .modal-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.2rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-600);
      font-size: 0.85rem;
      font-weight: 700;
    }
    .modal-subtitle { margin-top: 0.25rem; font-size: 0.9rem; color: var(--text-secondary); }
    .modal-body { padding: 1rem 1.25rem; overflow-y: auto; display: grid; gap: 0.75rem; }

    .shortlist-item {
      padding: 0.95rem 1rem;
      border-radius: 18px;
      border: 1px solid var(--success-border);
      background: var(--success-soft);
    }

    .shortlist-item-header { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    .shortlist-item-title { font-weight: 700; color: var(--text-primary); }
    .shortlist-item-description { margin-top: 0.35rem; font-size: 0.88rem; color: var(--text-secondary); }
    .shortlist-guidance { border-radius: 18px; padding: 1rem; border: 1px solid var(--warning-border); background: var(--warning-soft); }
    .shortlist-guidance-title { font-weight: 700; color: var(--text-primary); }
    .shortlist-guidance-text { margin-top: 0.35rem; font-size: 0.9rem; color: var(--text-secondary); }
    .modal-actions { padding: 1rem 1.25rem 1.25rem; border-top: 1px solid var(--border-soft); display: flex; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; }
    .modal-message { width: 100%; font-size: 0.9rem; color: var(--text-secondary); }
    .modal-message.warning { color: var(--warning-600); font-weight: 600; }
    .modal-button-row { display: flex; gap: 0.75rem; margin-left: auto; flex-wrap: wrap; }

    .item { transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease; transform: translateX(0); opacity: 1; }
    .item.removing { transform: translateX(-12%); opacity: 0; }
    .item.adding { transform: translateY(-12px); opacity: 0; }
    .item.added { transform: translateY(0); opacity: 1; }
    .complete-card { text-align: center; gap: 1.25rem; }
    .complete-card p { font-size: 0.95rem; }

    :focus-visible { outline: 3px solid var(--accent-ring); outline-offset: 3px; border-radius: 16px; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-muted); border-radius: 999px; }

    @media (max-width: 768px) {
      header { padding-top: 2.25rem; }
      .list-scroll { max-height: 300px; }
    }
  </style>
</head>
<body class="min-h-screen font-sans">
  <div class="page-shell">
    <header class="content-width px-4">
      <div class="flex flex-col gap-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
          <div class="brand-block">
            <div>
              <p class="eyebrow">Career Exploration</p>
              <h1 class="page-title">What are your work values?</h1>
            </div>
          </div>
          <div class="flex items-center gap-3 self-start md:self-center">
            <button id="themeToggle" class="btn btn-icon" type="button" aria-label="Toggle theme"></button>
          </div>
        </div>
        <div class="max-w-3xl">
          <p class="text-muted text-base md:text-lg">
            Career decisions start with knowing your values. Sort through 45 work values, rank what matters most to you, and walk away with a clearer, more personal sense of the career path.
          </p>
        </div>
      </div>
    </header>

    <main class="content-width px-4 pb-12 md:pb-16">
      <section id="workValuesContainer" class="mt-6 md:mt-10"></section>
    </main>

    <div id="shortlistModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="shortlistModalTitle">
        <div class="modal-header">
          <div>
            <div class="modal-title-wrap">
              <h2 id="shortlistModalTitle" class="modal-title">My shortlisted values</h2>
              <span id="shortlistCount" class="modal-count">0</span>
            </div>
            <p class="modal-subtitle">Keep your shortlisted values between 3 and 7.</p>
          </div>
          <button id="closeShortlistModalTop" class="btn btn-icon" type="button" aria-label="Close shortlisted values">×</button>
        </div>
        <div id="shortlistModalBody" class="modal-body"></div>
        <div class="modal-actions">
          <div id="shortlistModalMessage" class="modal-message"></div>
          <div class="modal-button-row">
            <button id="copyShortlistBtn" class="btn btn-primary" type="button">Copy Prompt</button>
            <button id="closeShortlistModal" class="btn btn-secondary" type="button">Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WORK_VALUES = [
      { label: "Keep solving problems", description: "Work involves tackling problems and finding solutions regularly." },
      { label: "Help others", description: "Work gives you chances to support and benefit other people." },
      { label: "Can get a raise", description: "Work offers opportunities for higher pay over time." },
      { label: "Look forward to changes in your job", description: "Work changes enough to stay fresh and engaging." },
      { label: "Have freedom in your area", description: "Work allows independence in how you do things." },
      { label: "Gain prestige in your field", description: "Work earns respect and standing in your area." },
      { label: "Need to have artistic ability", description: "Work depends on artistic sense or creative talent." },
      { label: "Are one of the gang", description: "Work helps you feel included as part of the group." },
      { label: "Know your job will last", description: "Work feels stable and likely to continue." },
      { label: "Can be the kind of person you would like to be", description: "Work fits the kind of person you want to become." },
      { label: "Have a boss who gives you a fair deal", description: "Work includes a fair and just supervisor." },
      { label: "Like the setting in which your work is done", description: "Work happens in an environment you enjoy being in." },
      { label: "Get the feeling of having done a good day’s work", description: "Work leaves you feeling satisfied at the end of the day." },
      { label: "Have the authority over others", description: "Work gives you authority or influence over other people." },
      { label: "Try out new ideas and suggestions", description: "Work gives room to test and explore ideas." },
      { label: "Create something new", description: "Work involves making or inventing something original." },
      { label: "Know by the results when you’ve done a good job", description: "Work gives clear feedback through visible results." },
      { label: "Have a boss who is reasonable", description: "Work includes a supervisor who is understanding and sensible." },
      { label: "Are sure of always having a job", description: "Work offers strong long-term job security." },
      { label: "Add beauty to the world", description: "Work contributes beauty, style, or artistic value." },
      { label: "Make your own decisions", description: "Work lets you decide things for yourself." },
      { label: "Have pay increases that keep up with the cost of living", description: "Work keeps earnings growing with expenses." },
      { label: "Are mentally challenged", description: "Work stretches your mind and keeps you thinking." },
      { label: "Use leadership abilities", description: "Work gives you chances to lead others." },
      { label: "Have adequate lounge, toilet and other facilities", description: "Work includes practical facilities that support comfort and well-being." },
      { label: "Have a way of life, while not on the job, that you like", description: "Work supports a life outside work that suits you." },
      { label: "Form friendships with your fellow employees", description: "Work helps you build friendships with colleagues." },
      { label: "Know that others consider your work important", description: "Work is seen by others as meaningful and valuable." },
      { label: "Do not do the same thing all the time", description: "Work avoids too much repetition." },
      { label: "Feel you have helped another person", description: "Work lets you make a difference to someone directly." },
      { label: "Add to the well-being of other people", description: "Work improves the lives of others in some way." },
      { label: "Do many different things", description: "Work includes a range of different tasks." },
      { label: "Are looked up to by others", description: "Work brings admiration or respect from others." },
      { label: "Have good connections with fellow workers", description: "Work involves strong relationships with co-workers." },
      { label: "Lead the kind of life you most enjoy", description: "Work supports the lifestyle you most want." },
      { label: "Have a good place in which to work (quiet, calm, etc.)", description: "Work happens in a setting that feels comfortable and suitable." },
      { label: "Plan and organize the work of others", description: "Work includes directing or organising what others do." },
      { label: "Need to be mentally alert", description: "Work requires focus, sharp thinking, and alertness." },
      { label: "Are paid enough to live very well", description: "Work provides enough income for a very comfortable life." },
      { label: "Are your own boss", description: "Work allows you to be self-directed or independent." },
      { label: "Make attractive products", description: "Work involves making things that are appealing or attractive." },
      { label: "Are sure of another job in the company if your present job ends", description: "Work offers security through other opportunities in the same organisation." },
      { label: "Have a supervisor who is considerate", description: "Work includes a supervisor who is thoughtful and caring." },
      { label: "See the result of your efforts", description: "Work lets you clearly see what your effort has produced." },
      { label: "Contribute new ideas", description: "Work gives opportunities to offer and apply new ideas." }
    ];

    let remainingValues = [];
    let lowValues = [];
    let midValues = [];
    let highValues = [];

    const qs = (sel) => document.querySelector(sel);

    function percent(n, d) { return d ? Math.round((n / d) * 100) : 0; }
    function slugify(text) { return text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, ""); }
    function countSorted() { return lowValues.length + midValues.length + highValues.length; }
    function getShortlistCount() { return highValues.length; }

    function updateShortlistTrigger() {
      const wrap = qs("#shortlisted-values-wrap");
      const hint = qs("#shortlistHint");
      if (!wrap || !hint) return;
      const finished = countSorted() === WORK_VALUES.length;
      const shortlistCount = getShortlistCount();
      wrap.classList.toggle("hidden", !(shortlistCount >= 3));
      hint.classList.toggle("hidden", !(finished && shortlistCount < 3));
    }

    function getCopyPromptText() {
  const shortlistedValues = highValues.map((item) => item.label);

  const valuesPart = shortlistedValues.length
    ? `My shortlisted work values are: ${shortlistedValues.join(", ")}.`
    : `I have not shortlisted any work values yet.`;

  return `I am a high school student exploring career options. ${valuesPart}

Please suggest 8–10 careers that strongly align with these work values. For each career, include:
- A brief description (1–2 sentences).
- Why it fits my combination of work values.
- Examples of industries or workplaces where this career exists.

Then, recommend 1–2 additional skills, traits, or experiences I could develop to strengthen my fit for these careers.`;
}

    async function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      let ok = false;
      try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
      document.body.removeChild(ta);
      return ok;
    }

    function updateModalState() {
      const countEl = qs("#shortlistCount");
      const body = qs("#shortlistModalBody");
      const message = qs("#shortlistModalMessage");
      const copyBtn = qs("#copyShortlistBtn");
      const count = getShortlistCount();
      if (countEl) countEl.textContent = String(count);
      if (!body || !message || !copyBtn) return;

      if (count < 3) {
        body.innerHTML = `
          <div class="shortlist-guidance">
            <div class="shortlist-guidance-title">Shortlist at least 3 values</div>
            <p class="shortlist-guidance-text">Choose at least 3 values under Matters a lot before copying your shortlist.</p>
          </div>
          ${highValues.map((item) => `
            <article class="shortlist-item">
              <div class="shortlist-item-header">
                <div class="shortlist-item-title">${item.label}</div>
                <button class="btn-link" type="button" data-remove-shortlist="${item.index}">Remove</button>
              </div>
              <p class="shortlist-item-description">${item.description}</p>
            </article>
          `).join("")}
        `;
        message.textContent = "Please shortlist at least 3 values before copying.";
        message.className = "modal-message warning";
        copyBtn.disabled = true;
        copyBtn.style.opacity = "0.55";
        copyBtn.style.cursor = "not-allowed";
      } else {
        body.innerHTML = highValues.map((item) => `
          <article class="shortlist-item">
            <div class="shortlist-item-header">
              <div class="shortlist-item-title">${item.label}</div>
              <button class="btn-link" type="button" data-remove-shortlist="${item.index}">Remove</button>
            </div>
            <p class="shortlist-item-description">${item.description}</p>
          </article>
        `).join("");

        if (count > 7) {
          message.textContent = "Please reduce your shortlist to 7 values at most before copying.";
          message.className = "modal-message warning";
          copyBtn.disabled = true;
          copyBtn.style.opacity = "0.55";
          copyBtn.style.cursor = "not-allowed";
        } else {
          message.textContent = "Prompt is ready for copy.";
          message.className = "modal-message";
          copyBtn.disabled = false;
          copyBtn.style.opacity = "";
          copyBtn.style.cursor = "";
        }
      }

      body.querySelectorAll("[data-remove-shortlist]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-remove-shortlist"));
          revertItem(index, "high", true);
        });
      });
    }

    function openShortlistModal() {
      const modal = qs("#shortlistModal");
      if (!modal) return;
      updateModalState();
      modal.classList.remove("hidden");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeShortlistModal() {
      const modal = qs("#shortlistModal");
      if (!modal) return;
      modal.classList.add("hidden");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    async function handleCopyPrompt() {
      const count = getShortlistCount();
      if (count < 3 || count > 7) { updateModalState(); return; }
      const ok = await copyToClipboard(getCopyPromptText());
      const message = qs("#shortlistModalMessage");
      if (message) {
        message.textContent = ok ? "Shortlisted values copied to clipboard." : "Copy failed. Please try again.";
        message.className = "modal-message";
      }
    }

    function makeListItem(column, item, index) {
      const safeId = `work-values-${column}-${slugify(item.label)}-${index}`;
      const li = document.createElement("li");
      li.id = safeId;
      li.className = "item list-card adding";
      li.dataset.itemIndex = String(index);
      li.innerHTML = `
        <div class="item-header">
          <span class="item-title">${item.label}</span>
          <button class="btn-link" type="button">Remove</button>
        </div>
        <p class="item-description">${item.description}</p>
      `;
      li.querySelector("button").addEventListener("click", () => revertItem(index, column));
      return li;
    }

    function updateProgress() {
      const total = WORK_VALUES.length;
      const done = countSorted();
      const pct = percent(done, total);
      const bar = qs("#work-values-progress-bar");
      const text = qs("#work-values-progress-text");
      const fraction = qs("#work-values-progress-fraction");
      if (bar) bar.style.width = `${pct}%`;
      if (fraction) fraction.textContent = `${done}/${total}`;
      if (text) text.textContent = done === total ? "All values sorted" : `${total - done} left to sort`;
      const setCount = (id, n) => { const el = qs(id); if (el) el.textContent = `(${n})`; };
      setCount("#work-values-low-count", lowValues.length);
      setCount("#work-values-mid-count", midValues.length);
      setCount("#work-values-high-count", highValues.length);
    }

    function updateCurrentCard() {
      const currentWrap = qs("#work-values-current");
      if (!currentWrap) return;
      if (!remainingValues[0]) {
        currentWrap.innerHTML = `
          <article class="current-card complete-card">
            <div>
              <span class="chip">Complete</span>
              <p>All 45 work values sorted. You can still revisit your choices below.</p>
            </div>
          </article>
        `;
        return;
      }
      const item = remainingValues[0];
      currentWrap.innerHTML = `
        <article class="current-card">
          <div>
            <span class="chip">Up next</span>
            <h2 class="current-title">${item.label}</h2>
            <p>${item.description}</p>
          </div>
          <div class="choice-group">
            <button id="work-values-high-btn" class="btn choice-btn-high" type="button">Matters a lot</button>
            <button id="work-values-mid-btn" class="btn choice-btn-mid" type="button">Somewhat matters</button>
            <button id="work-values-low-btn" class="btn choice-btn-low" type="button">Does not matter much</button>
          </div>
        </article>
      `;
      qs("#work-values-high-btn").onclick = () => rateItem(item.index, "high");
      qs("#work-values-mid-btn").onclick = () => rateItem(item.index, "mid");
      qs("#work-values-low-btn").onclick = () => rateItem(item.index, "low");
    }

    function appendToList(column, item, index) {
      const ul = qs(`#work-values-${column}`);
      if (!ul) return;
      const li = makeListItem(column, item, index);
      ul.appendChild(li);
      requestAnimationFrame(() => { li.classList.remove("adding"); li.classList.add("added"); });
    }

    function removeFromList(column, index) {
      const li = Array.from(document.querySelectorAll(`#work-values-${column} li`)).find((el) => el.dataset.itemIndex === String(index));
      if (!li) return Promise.resolve();
      li.classList.add("removing");
      return new Promise((resolve) => setTimeout(() => { li.remove(); resolve(); }, 350));
    }

    function initialRender() {
      const html = `
        <div class="status-card">
          <div class="progress-row">
            <span class="progress-label">Progress</span>
            <span id="work-values-progress-fraction" class="progress-fraction">0/45</span>
          </div>
          <div class="progress-track">
            <div id="work-values-progress-bar" class="progress-bar" style="width:0%"></div>
          </div>
          <p id="work-values-progress-text" class="progress-text">45 left to sort</p>
        </div>

        <div class="grid-layout">
          <div>
            <h2 class="text-lg font-semibold text-muted mb-3">Current Work Value</h2>
            <div id="work-values-current"></div>
          </div>

          <div class="list-column column-high">
            <div class="column-header">
              <span>Matters a lot</span>
              <span id="work-values-high-count" class="count-badge">(0)</span>
            </div>
            <ul id="work-values-high" class="list-scroll"></ul>
            <div class="column-footer">
              <div id="shortlistHint" class="shortlist-hint hidden">
                <div class="shortlist-hint-title">Shortlist at least 3 values</div>
                <p class="shortlist-hint-text">To continue, place at least 3 values under Matters a lot.</p>
              </div>
              <div id="shortlisted-values-wrap" class="hidden">
                <button id="shortlisted-values-btn" class="btn btn-primary" type="button">My shortlisted values</button>
              </div>
            </div>
          </div>

          <div class="list-column column-mid">
            <div class="column-header">
              <span>Somewhat matters</span>
              <span id="work-values-mid-count" class="count-badge">(0)</span>
            </div>
            <ul id="work-values-mid" class="list-scroll"></ul>
          </div>

          <div class="list-column column-low">
            <div class="column-header">
              <span>Does not matter much</span>
              <span id="work-values-low-count" class="count-badge">(0)</span>
            </div>
            <ul id="work-values-low" class="list-scroll"></ul>
          </div>

          <div class="mt-4">
            <button id="resetButton" class="btn btn-secondary w-full" type="button">Reset Work Values</button>
          </div>
        </div>
      `;

      qs("#workValuesContainer").innerHTML = html;
      qs("#shortlisted-values-btn")?.addEventListener("click", openShortlistModal);
      qs("#copyShortlistBtn")?.addEventListener("click", handleCopyPrompt);
      qs("#closeShortlistModal")?.addEventListener("click", closeShortlistModal);
      qs("#closeShortlistModalTop")?.addEventListener("click", closeShortlistModal);
      qs("#resetButton")?.addEventListener("click", resetAll);
      qs("#shortlistModal")?.addEventListener("click", (event) => { if (event.target.id === "shortlistModal") closeShortlistModal(); });
      document.addEventListener("keydown", (event) => { if (event.key === "Escape") closeShortlistModal(); });
      updateCurrentCard();
      updateProgress();
      updateShortlistTrigger();
    }

    function rateItem(index, bucket) {
      const current = remainingValues[0];
      if (!current || current.index !== index) return;
      const target = bucket === "high" ? highValues : bucket === "mid" ? midValues : lowValues;
      target.push(current);
      remainingValues.shift();
      appendToList(bucket, current, current.index);
      updateCurrentCard();
      updateProgress();
      updateShortlistTrigger();
      if (!qs("#shortlistModal")?.classList.contains("hidden")) updateModalState();
    }

    function revertItem(index, fromBucket, keepModalOpen = false) {
      const source = fromBucket === "high" ? highValues : fromBucket === "mid" ? midValues : lowValues;
      removeFromList(fromBucket, index).then(() => {
        const idx = source.findIndex((item) => item.index === index);
        if (idx > -1) {
          const restored = source.splice(idx, 1)[0];
          remainingValues.push(restored);
        }
        updateCurrentCard();
        updateProgress();
        updateShortlistTrigger();
        if (keepModalOpen) updateModalState();
      });
    }

    function resetAll() {
      remainingValues = WORK_VALUES.map((item, index) => ({ ...item, index }));
      lowValues = [];
      midValues = [];
      highValues = [];
      qs("#work-values-low").innerHTML = "";
      qs("#work-values-mid").innerHTML = "";
      qs("#work-values-high").innerHTML = "";
      updateCurrentCard();
      updateProgress();
      updateShortlistTrigger();
      closeShortlistModal();
    }

    function setupThemeToggle() {
      const toggleBtn = qs("#themeToggle");
      if (!toggleBtn) return;
      const storageKey = "ce-theme";
      const root = document.documentElement;
      const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

      function setButtonIcon(theme) {
        toggleBtn.innerHTML = theme === "dark" ? "🌙" : "☀️";
        toggleBtn.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      }

      function applyTheme(theme, persist = false) {
        root.dataset.theme = theme;
        setButtonIcon(theme);
        if (persist) {
          try { localStorage.setItem(storageKey, theme); } catch (err) {}
        }
      }

      const storedTheme = (() => {
        try { return localStorage.getItem(storageKey); } catch (err) { return null; }
      })();

      const initialTheme = root.dataset.theme || storedTheme || (mediaQuery.matches ? "dark" : "light");
      applyTheme(initialTheme);

      toggleBtn.addEventListener("click", () => {
        const nextTheme = root.dataset.theme === "dark" ? "light" : "dark";
        applyTheme(nextTheme, true);
      });

      if (mediaQuery.addEventListener) {
        mediaQuery.addEventListener("change", (event) => {
          const hasStored = (() => {
            try { return localStorage.getItem(storageKey) !== null; } catch (err) { return false; }
          })();
          if (!hasStored) applyTheme(event.matches ? "dark" : "light");
        });
      }
    }

    function boot() {
      remainingValues = WORK_VALUES.map((item, index) => ({ ...item, index }));
      initialRender();
      setupThemeToggle();
    }

    boot();
  </script>
</body>
</html>
